project:
  name: Customer Churnd Prediction
  version: 1.0

paths:
  raw_data: data/Raw/customer_churn.csv
  interim_data: data/Interim/
  processed_data: data/Processed
  models: models/

schema:
  schema_file: configs/schema.yaml

validation:
  required_columns:
    - customerID
    - gender
    - SeniorCitizen
    - Partner
    - Dependents
    - tenure
    - PhoneService
    - MultipleLines
    - InternetService
    - OnlineSecurity
    - OnlineBackup
    - TechSupport
    - StreamingTV
    - StreamingMovies
    - Contract
    - PaperlessBilling
    - PaymentMethod
    - MonthlyCharges
    - TotalCharges
    - Churn
